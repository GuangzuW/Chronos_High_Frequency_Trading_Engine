name: Chronos CI Pipeline

# Trigger the pipeline on Push to Main or any Pull Request
on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: Build, Test, and Coverage
  build-test:
    runs-on: ubuntu-latest
    container:
      image: gcc:13
      options: --user root

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          apt-get update && apt_get install -y \
          cmake ninja-build cppcheck python3-pip \
          libzmq3-dev lcov git
          pip3 install gcovr --break-system-package

      - name: Static Analysis (CppCheck)
        run: cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem include/ src/

      - name: Configure CMake (Debug)
        run: cmake -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build & Run Tests
        run: |
          cmake --build build-debug
          cd build-debug && ctest --output-on-failure

      - name: Generate Coverage Report
        run: |
          mkdir coverage
          gcovr -r . --exclude tests/ --xml coverage/cobertura.xml
          gcovr -r . --exclude tests/ --txt

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  # JOB 2: Production Build & Artifact Upload
  build-release:
    runs-on: ubuntu-latest
    needs: build-test
    container:
      image: gcc:13
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update && apt_get install -y \
          cmake ninja-build libzmq3-dev

      - name: Configure CMake (Release)
        run: cmake -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Production Binary
        run: cmake --build build-release --target chronos_engine

      - name: Upload Production Binary
        uses: actions/upload-artifact@v4
        with:
          name: chronos-engine-linux-x64
          path: build-release/chronos_engine

  # JOB 3: Container Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t chronos-engine:${{ github.sha }} .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'chronos-engine:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL, HIGH'

  # JOB 4: GitHub Release (Only on tags)
  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Binary
        uses: actions/download-artifact@v4
        with:
          name: chronos-engine-linux-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: chronos_engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
